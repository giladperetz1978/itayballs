<!doctype html>
<html lang="he">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>itayballs</title>
  <style>
    :root {
      --bg: #0b1320;
      --card: #121b2e;
      --text: #f4f7ff;
      --muted: #b6c0d8;
      --accent: #3dd9b0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 20% -10%, #1f335f 0%, transparent 60%),
        radial-gradient(900px 500px at 120% 120%, #11423b 0%, transparent 60%),
        var(--bg);
    }
    .card {
      width: min(720px, 92vw);
      background: linear-gradient(180deg, #16233d 0%, var(--card) 100%);
      border: 1px solid #2f446f;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 10px; font-size: clamp(1.8rem, 2.8vw, 2.8rem); }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .badge {
      display: inline-block;
      margin-top: 14px;
      background: rgba(61, 217, 176, 0.15);
      color: var(--accent);
      border: 1px solid rgba(61, 217, 176, 0.45);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>itayballs</h1>
    <p>
      This repository is now connected and published with GitHub Pages.
      You can edit this file to customize your live site.
    </p>
    <span class="badge">Live via GitHub Pages</span>
  </main>
</body>
</html>
